<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理登录 · SHEIN校园大使</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=3" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>SHEIN 管理后台</h1>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input type="email" id="login-email" class="form-input" required placeholder="admin@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" id="login-password" class="form-input" required placeholder="输入密码" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
          登录
        </button>
      </form>
      <p style="text-align:center;margin-top:20px;font-size:13px;">
        <a href="../index.html" style="color:rgba(255,255,255,.5);">← 返回前台</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/admin.js?v=3"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理登录</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>管理后台登录</h1>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input type="email" id="login-email" class="form-input" required placeholder="admin@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" id="login-password" class="form-input" required placeholder="输入密码" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
          登录
        </button>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-secondary);">
        <a href="../index.html">← 返回前台</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 · SHEIN校园大使</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=8" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="navbar-brand">SHEIN 管理后台</a>
      <div class="navbar-links">
        <span id="user-email" style="font-size:13px;color:rgba(255,255,255,.55);padding:6px 0;"></span>
        <button id="logout-btn" class="btn btn-sm" style="margin-left:8px;background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);color:#fff;">退出</button>
      </div>
    </div>
  </nav>

  <main class="container" id="admin-dashboard">
    <div class="tabs">
      <button class="tab-btn active" data-tab="tab-content">内容管理</button>
      <button class="tab-btn" data-tab="tab-files">文件管理</button>
      <button class="tab-btn" data-tab="tab-messages">留言管理</button>
      <button class="tab-btn" data-tab="tab-referral">内推管理</button>
      <button class="tab-btn" data-tab="tab-news">动态管理</button>
      <button class="tab-btn" data-tab="tab-analytics">访问统计</button>
    </div>

    <!-- 内容管理 -->
    <div id="tab-content" class="tab-panel active">
      <p class="page-subtitle">编辑前台各页面的标题和正文内容</p>
      <div id="pages-container">
        <div class="loading">加载中…</div>
      </div>
    </div>

    <!-- 文件管理 -->
    <div id="tab-files" class="tab-panel">
      <p class="page-subtitle">上传文件供访客下载</p>

      <div class="card" style="margin-bottom:24px;">
        <div id="upload-zone" class="file-upload-zone">
          <p style="font-size:28px;margin-bottom:8px;">📁</p>
          <p>点击或拖拽文件到此处</p>
          <p style="font-size:12px;margin-top:4px;">支持任意格式，建议单文件不超过 50MB</p>
        </div>
        <input type="file" id="file-input" style="display:none;" />
        <div class="form-group" style="margin-top:12px;">
          <label class="form-label">文件说明（选填）</label>
          <input type="text" id="file-description" class="form-input" placeholder="简要描述此文件" />
        </div>
        <div class="form-group">
          <label class="form-label">预览图（选填，不上传则自动显示文件类型图标）</label>
          <input type="file" id="file-preview-input" accept="image/*" class="form-input" />
        </div>
        <button id="upload-btn" class="btn btn-primary" style="margin-top:4px;">上传文件</button>
      </div>

      <div id="files-container">
        <div class="loading">加载中…</div>
      </div>
    </div>

    <!-- 留言管理 -->
    <div id="tab-messages" class="tab-panel">
      <p class="page-subtitle">查看和删除访客留言</p>
      <div id="messages-container" class="card">
        <div class="loading">加载中…</div>
      </div>
    </div>

    <!-- 内推管理 -->
    <div id="tab-referral" class="tab-panel">
      <p class="page-subtitle">管理各月份的内推排行榜数据</p>

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
        <label class="form-label" style="margin:0;">选择月份：</label>
        <select id="referral-month-select" class="form-input" style="width:auto;min-width:160px;">
          <option value="">加载中…</option>
        </select>
        <button id="add-referral-month-btn" class="btn btn-sm" style="background:var(--accent);color:#fff;border:none;">+ 新增月份</button>
      </div>

      <div id="referral-editor">
        <div class="loading">选择月份后加载数据…</div>
      </div>
    </div>

    <!-- 动态管理 -->
    <div id="tab-news" class="tab-panel">
      <p class="page-subtitle">管理日历事件与活动看板</p>

      <h3 style="margin:0 0 12px;font-size:16px;">📅 日历事件</h3>
      <div class="card" style="margin-bottom:24px;">
        <div style="display:grid;grid-template-columns:1fr 2fr 2fr auto;gap:8px;align-items:end;">
          <div class="form-group" style="margin:0;">
            <label class="form-label">日期</label>
            <input type="date" id="event-date" class="form-input" />
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">活动标题</label>
            <input type="text" id="event-title" class="form-input" placeholder="如：校园宣讲" />
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">描述（选填）</label>
            <input type="text" id="event-desc" class="form-input" placeholder="活动简要描述" />
          </div>
          <button id="add-event-btn" class="btn btn-primary" style="height:40px;">添加</button>
        </div>
        <div class="form-group" style="margin:8px 0 0;">
          <label class="form-label">跳转链接（选填，点击日历事件时自动跳转）</label>
          <input type="url" id="event-link" class="form-input" placeholder="https://..." />
        </div>
      </div>
      <div id="events-container" style="margin-bottom:32px;">
        <div class="loading">加载中…</div>
      </div>

      <h3 style="margin:0 0 12px;font-size:16px;">📢 活动看板</h3>
      <div class="card" style="margin-bottom:24px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div class="form-group" style="margin:0;">
            <label class="form-label">活动标题</label>
            <input type="text" id="act-title" class="form-input" placeholder="活动名称" />
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">跳转链接</label>
            <input type="url" id="act-link" class="form-input" placeholder="https://..." />
          </div>
        </div>
        <div class="form-group" style="margin-top:8px;">
          <label class="form-label">描述（选填）</label>
          <input type="text" id="act-desc" class="form-input" placeholder="活动简要描述" />
        </div>
        <div style="display:flex;gap:8px;align-items:end;margin-top:8px;">
          <div class="form-group" style="margin:0;flex:1;">
            <label class="form-label">封面图片</label>
            <input type="file" id="act-image" accept="image/*" class="form-input" />
          </div>
          <div class="form-group" style="margin:0;width:80px;">
            <label class="form-label">排序</label>
            <input type="number" id="act-order" class="form-input" value="0" min="0" />
          </div>
          <button id="add-activity-btn" class="btn btn-primary" style="height:40px;">添加</button>
        </div>
      </div>
      <div id="activities-container">
        <div class="loading">加载中…</div>
      </div>
    </div>

    <!-- 访问统计 -->
    <div id="tab-analytics" class="tab-panel">
      <p class="page-subtitle">查看网站访问数据</p>

      <div id="analytics-cards" class="stats-cards">
        <div class="loading">加载中…</div>
      </div>

      <h3 style="margin:28px 0 12px;font-size:16px;">📅 按日期查看</h3>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
        <label class="form-label" style="margin:0;">选择日期：</label>
        <input type="date" id="analytics-date" class="form-input" style="width:auto;min-width:160px;" />
        <button id="analytics-query-btn" class="btn btn-primary btn-sm">查询</button>
      </div>
      <div id="analytics-date-detail">
        <div class="empty-state"><p>选择日期后点击查询</p></div>
      </div>

      <h3 style="margin:28px 0 12px;font-size:16px;">📊 近 30 天每日访问</h3>
      <div id="analytics-daily">
        <div class="loading">加载中…</div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/admin.js?v=8"></script>
</body>
</html>
